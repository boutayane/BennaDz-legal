<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BennaDz — Informations légales</title>
<style>
  :root { --terra:#C6522E; --terra-dark:#9E3F22; --ink:#2A211C; --muted:#7A6E66; --bg:#FBF7F4; --card:#fff; --border:#EADFD8; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:var(--bg); color:var(--ink); line-height:1.6; }
  .wrap { max-width:720px; margin:0 auto; padding:32px 20px 64px; }
  header { text-align:center; padding:40px 20px; }
  .logo { width:76px; height:76px; border-radius:20px; background:var(--terra); color:#fff; display:inline-flex; align-items:center; justify-content:center; font-size:34px; font-weight:800; letter-spacing:-1px; }
  h1 { font-size:26px; margin:18px 0 6px; }
  .tag { color:var(--muted); margin:0; }
  .cards { display:grid; gap:16px; margin-top:24px; }
  a.card { display:flex; align-items:center; gap:16px; background:var(--card); border:1px solid var(--border); border-radius:16px; padding:20px; text-decoration:none; color:inherit; transition:.15s; }
  a.card:hover { border-color:var(--terra); transform:translateY(-1px); }
  .ico { width:44px; height:44px; border-radius:12px; background:rgba(198,82,46,.12); color:var(--terra); display:flex; align-items:center; justify-content:center; font-size:22px; flex:none; }
  .card b { display:block; font-size:16px; }
  .card span { color:var(--muted); font-size:14px; }
  footer { text-align:center; color:var(--muted); font-size:13px; margin-top:40px; }
  footer a { color:var(--terra); }
</style>
</head>
<body>
<header>
  <div class="logo">B</div>
  <h1>BennaDz</h1>
  <p class="tag">Vos plats préférés, près de chez vous.</p>
</header>
<div class="wrap">
  <div class="cards">
    <a class="card" href="./privacy.html">
      <div class="ico">🔒</div>
      <div><b>Politique de confidentialité</b><span>Comment nous protégeons vos données</span></div>
    </a>
    <a class="card" href="./cgu.html">
      <div class="ico">📄</div>
      <div><b>Conditions Générales d'Utilisation</b><span>Les règles d'utilisation de l'application</span></div>
    </a>
    <a class="card" href="mailto:BennaDz01@gmail.com">
      <div class="ico">✉️</div>
      <div><b>Nous contacter</b><span>BennaDz01@gmail.com</span></div>
    </a>
  </div>
  <footer>© 2026 BennaDz — Algérie</footer>
</div>
</body>
</html>
