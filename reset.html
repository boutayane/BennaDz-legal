<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Réinitialiser le mot de passe — BennaDz</title>
<style>
  :root { --terra:#C6522E; --ink:#2A211C; --muted:#7A6E66; --bg:#FBF7F4; --card:#fff; --border:#EADFD8; --ok:#2E7D46; --err:#C0341E; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:var(--bg); color:var(--ink); line-height:1.6; }
  .wrap { max-width:460px; margin:0 auto; padding:40px 20px; }
  .logo { width:72px; height:72px; border-radius:20px; background:var(--terra); display:flex; align-items:center; justify-content:center; margin:0 auto 16px; color:#fff; font-size:34px; }
  h1 { font-size:22px; text-align:center; margin:0 0 4px; }
  p.sub { color:var(--muted); text-align:center; margin:0 0 24px; font-size:15px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:24px; }
  label { display:block; font-weight:600; font-size:14px; margin:14px 0 6px; }
  input { width:100%; padding:13px 14px; border:1px solid var(--border); border-radius:12px; font-size:16px; }
  button { width:100%; margin-top:20px; padding:14px; border:0; border-radius:12px; background:var(--terra); color:#fff; font-size:16px; font-weight:700; cursor:pointer; }
  button:disabled { opacity:.5; }
  .msg { margin-top:16px; padding:12px 14px; border-radius:12px; font-size:14.5px; display:none; }
  .msg.ok { display:block; background:#E7F4EC; color:var(--ok); }
  .msg.err { display:block; background:#FBE9E5; color:var(--err); }
  .hint { color:var(--muted); font-size:13px; margin-top:6px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">🍴</div>
  <h1>Nouveau mot de passe</h1>
  <p class="sub">Choisissez un nouveau mot de passe pour votre compte vendeur BennaDz.</p>
  <div class="card">
    <div id="loading" class="hint">Vérification du lien…</div>
    <div id="form" style="display:none">
      <label for="pwd">Nouveau mot de passe</label>
      <input id="pwd" type="password" autocomplete="new-password" placeholder="Au moins 8 caractères" />
      <div class="hint">Au moins 8 caractères, avec un chiffre et un caractère spécial.</div>
      <label for="pwd2">Confirmer le mot de passe</label>
      <input id="pwd2" type="password" autocomplete="new-password" placeholder="Retapez le mot de passe" />
      <button id="save">Enregistrer</button>
    </div>
    <div id="msg" class="msg"></div>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

  // Clés PUBLIQUES (identiques à celles embarquées dans l'app — sans danger).
  const SUPABASE_URL = 'https://uqheoxnxjcqyxwajqdly.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVxaGVveG54amNxeXh3YWpxZGx5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MDkyNzIsImV4cCI6MjA5OTE4NTI3Mn0.yqtcmo43fwBnL1mzl6xhQQRrCdnHCgr7WAcqg7eEGOo';

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON, {
    auth: { detectSessionInUrl: true, flowType: 'implicit' },
  });

  const $ = (id) => document.getElementById(id);
  const showMsg = (text, ok) => { const m = $('msg'); m.textContent = text; m.className = 'msg ' + (ok ? 'ok' : 'err'); };

  function isStrong(p) {
    return p.length >= 8 && /[0-9]/.test(p) && /[^A-Za-z0-9]/.test(p);
  }

  // Le lien de récupération dépose un jeton dans l'URL ; supabase-js crée alors
  // une session temporaire. On attend l'événement PASSWORD_RECOVERY.
  let ready = false;
  supabase.auth.onAuthStateChange((event, session) => {
    if (session) {
      ready = true;
      $('loading').style.display = 'none';
      $('form').style.display = 'block';
    }
  });

  // Repli : si aucune session après 3 s, le lien est invalide ou expiré.
  setTimeout(async () => {
    if (ready) return;
    const { data } = await supabase.auth.getSession();
    if (data.session) {
      $('loading').style.display = 'none';
      $('form').style.display = 'block';
    } else {
      $('loading').style.display = 'none';
      showMsg("Lien invalide ou expiré. Redemandez un e-mail de réinitialisation depuis l'application.", false);
    }
  }, 3000);

  $('save').addEventListener('click', async () => {
    const p1 = $('pwd').value, p2 = $('pwd2').value;
    if (!isStrong(p1)) { showMsg('Mot de passe trop faible (8 caractères, un chiffre, un caractère spécial).', false); return; }
    if (p1 !== p2) { showMsg('Les deux mots de passe ne correspondent pas.', false); return; }
    $('save').disabled = true;
    const { error } = await supabase.auth.updateUser({ password: p1 });
    $('save').disabled = false;
    if (error) { showMsg('Erreur : ' + error.message, false); return; }
    $('form').style.display = 'none';
    showMsg('✅ Mot de passe modifié ! Vous pouvez revenir à l\'application et vous connecter.', true);
  });
</script>
</body>
</html>
